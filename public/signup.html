<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SurgPrep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/landing.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="/" class="nav-logo" style="justify-content: center; margin-bottom: 24px; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                <span class="logo-icon">🔬</span>
                <span class="logo-text">SurgPrep</span>
            </a>
            <h1>Create your account</h1>
            <p class="auth-subtitle">Get access to 27+ surgical procedures with real OR knowledge</p>

            <div class="auth-error" id="authError"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Name (optional)</label>
                    <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary btn-full" id="submitBtn">Create Account</button>
            </form>

            <div class="auth-links">
                <a href="/login.html">Already have an account? Log in</a>
            </div>
            <div class="auth-back">
                <a href="/">← Back to home</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('authError');
            errorEl.style.display = 'none';
            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        name: document.getElementById('name').value.trim(),
                        email: document.getElementById('email').value.trim().toLowerCase(),
                        password: document.getElementById('password').value,
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Signup failed');

                // Redirect to app (will check subscription there)
                window.location.href = '/app.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
