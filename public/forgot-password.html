<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — SurgPrep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/landing.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="/" class="nav-logo" style="justify-content: center; margin-bottom: 24px; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                <span class="logo-icon">🔬</span>
                <span class="logo-text">SurgPrep</span>
            </a>
            <h1>Forgot your password?</h1>
            <p class="auth-subtitle">Enter your email and we'll send a reset link</p>

            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn-primary btn-full" id="submitBtn">Send Reset Link</button>
            </form>

            <div class="auth-links">
                <a href="/login.html">Back to login</a>
            </div>
            <div class="auth-back">
                <a href="/">← Back to home</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('authError');
            const successEl = document.getElementById('authSuccess');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            btn.textContent = 'Sending...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value.trim().toLowerCase() })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed');

                successEl.textContent = 'If an account with that email exists, a reset link has been sent. Check your inbox.';
                successEl.style.display = 'block';
                btn.textContent = 'Sent!';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
